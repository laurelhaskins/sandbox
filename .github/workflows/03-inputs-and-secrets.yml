# ─────────────────────────────────────────────────────────────────────────────
# 03 · Inputs, Variables & Secrets — parameterized runs from the UI
# ─────────────────────────────────────────────────────────────────────────────
# Bitbucket comparison:
#   - workflow_dispatch `inputs:` ≈ Bitbucket's `custom:` pipeline variables that
#     pop up a form when you trigger manually. Here you get a real UI form with
#     dropdowns, booleans, and defaults.
#   - `secrets` ≈ Bitbucket repository/workspace variables marked "Secured".
#   - `env:` ≈ plain (unsecured) repository variables.

name: 03 · Inputs & Secrets

on:
  workflow_dispatch:
    # These inputs render as a FORM in the "Run workflow" dialog in the UI.
    inputs:
      target_env:
        description: 'Which environment to pretend-deploy to'
        type: choice          # renders a dropdown
        options:
          - staging
          - production
        default: staging
      greeting:
        description: 'A message to print'
        type: string
        default: 'Hello!'
        required: true
      dry_run:
        description: 'Just print, do not "deploy"'
        type: boolean         # renders a checkbox
        default: true

# Workflow-level env vars are available to every job/step below.
env:
  GLOBAL_NOTE: "This env var is visible to all steps in this workflow."

jobs:
  show-inputs:
    name: Use the inputs
    runs-on: ubuntu-latest
    steps:
      - name: Echo the inputs the user chose
        run: |
          echo "Greeting:    ${{ inputs.greeting }}"
          echo "Target env:  ${{ inputs.target_env }}"
          echo "Dry run?:    ${{ inputs.dry_run }}"
          echo "Global note: $GLOBAL_NOTE"

      - name: Conditional step (only on production)
        # `if:` controls whether a step runs at all. Great for env-specific logic.
        if: ${{ inputs.target_env == 'production' }}
        run: echo "⚠️  This step ONLY runs when target_env == production"

      - name: Using a secret (safely)
        # Secrets live in: repo Settings → Secrets and variables → Actions.
        # Create one named PRACTICE_SECRET to see this work; otherwise it's empty.
        # GitHub auto-masks secret values in logs (they show as ***).
        env:
          MY_SECRET: ${{ secrets.PRACTICE_SECRET }}
        run: |
          if [ -z "$MY_SECRET" ]; then
            echo "No PRACTICE_SECRET set yet. Add one in repo Settings to test masking."
          else
            echo "Secret is set. Its value is masked here: $MY_SECRET"
          fi
